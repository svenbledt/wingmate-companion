# WingMate desktop companion — release pipeline.
#
# Lives in a SEPARATE personal-GitHub repo (e.g. <user>/wingmate-companion-releases), NOT in the
# monorepo, to stay off the org's Actions-minutes cap. Runs on a SELF-HOSTED Windows runner (the
# maintainer's licensed dev machine) because the MSFS 2024 SDK EULA does not grant redistributing
# the SimConnect client assemblies into cloud CI — the SDK never leaves the licensed machine; only
# the built app is published. See README.md in this folder for the full setup + runbook.
#
# vpk CLI surface verified against current Velopack docs (Context7, /velopack/velopack.docs).
name: release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'monorepo ref/tag to build'
        required: true

# The built-in GITHUB_TOKEN defaults to read-only; creating the GitHub Release (vpk upload)
# needs write access to the release repo's contents/releases.
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: [self-hosted, windows]   # the dev machine (has dotnet + MSFS 2024 SDK + vpk)
    steps:
      # The build ref + version come from the SAME source: the dispatch input ref when present
      # (workflow_dispatch), else the pushed tag name (push: tags). On a dispatch run
      # GITHUB_REF_NAME is the release repo's branch ("main"), so we must NOT derive the version
      # from it — use the input ref. Both paths expect a monorepo tag like v0.1.0.
      - name: Resolve build ref + version
        shell: pwsh
        run: |
          $ref = '${{ github.event.inputs.ref }}'
          if (-not $ref) { $ref = $env:GITHUB_REF_NAME }
          $ver = $ref -replace '^v',''
          if (-not $ver) { throw 'Could not derive a version (no dispatch ref and no v-tag).' }
          "BUILD_REF=$ref" >> $env:GITHUB_ENV
          "VER=$ver" >> $env:GITHUB_ENV

      - name: Checkout the monorepo (private)
        uses: actions/checkout@v4
        with:
          repository: WingMateMSFS/wingmate
          ref: ${{ env.BUILD_REF }}
          token: ${{ secrets.MONOREPO_READ_TOKEN }}
          path: monorepo

      # Self-hosted runners keep the workspace between runs; wipe stale publish/releases output
      # so a re-run of the same version doesn't trip vpk's "release >= current version exists".
      - name: Clean previous build output
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force "${{ github.workspace }}/publish" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "${{ github.workspace }}/releases" -ErrorAction SilentlyContinue

      # SimConnect gate ON: the runner has the MSFS 2024 SDK. The monorepo's machine-local
      # client/Directory.Build.props is gitignored, so the checked-out copy does NOT have it.
      # We therefore force the gate with -p:SimConnectSdkAvailable=true and rely on the csproj's
      # DEFAULT SDK paths (C:\MSFS 2024 SDK\...). If the SDK is installed elsewhere on the runner,
      # also pass -p:MsfsSdkManagedPath=... -p:MsfsSdkNativePath=... (see README).
      - name: Publish client (SimConnect gate on)
        shell: pwsh
        working-directory: monorepo
        run: >
          dotnet publish client/src/WingMate.Companion/WingMate.Companion.csproj
          -c Release
          -o ${{ github.workspace }}/publish
          -p:SimConnectSdkAvailable=true

      # Fetch the prior release into the output dir so vpk pack can generate a DELTA against it.
      # First release has none -> non-fatal. --token avoids rate limiting / private-repo issues.
      - name: Fetch previous release for delta
        shell: pwsh
        run: >
          vpk download github
          --repoUrl https://github.com/${{ github.repository }}
          --token ${{ secrets.GITHUB_TOKEN }}
          --outputDir ${{ github.workspace }}/releases
        continue-on-error: true   # first release has no prior

      # Pack the published app into a full + delta + Setup.exe. --delta BestSpeed is the vpk default;
      # set explicitly for clarity. -e/--mainExe pins the entry exe (matches AssemblyName).
      # NOTE: code-signing flags are added later once a cert exists, e.g.
      #   --signParams "/td sha256 /fd sha256 /f cert.pfx /tr http://timestamp.acme/rfc3161"
      # (signtool) or --signTemplate "jsign ... {{file}}". Until then releases are unsigned.
      - name: Pack
        shell: pwsh
        run: >
          vpk pack
          -u WingMateCompanion
          -v $env:VER
          -p ${{ github.workspace }}/publish
          -o ${{ github.workspace }}/releases
          -e WingMate.Companion.exe
          --delta BestSpeed

      # Upload from the same dir vpk pack wrote to (-o). --publish flips the release from draft to
      # published so the installed client's GitHubSource feed sees it. GITHUB_TOKEN is the
      # release-repo token (auto-provided), scoped to ${{ github.repository }} (this release repo).
      - name: Publish GitHub Release
        shell: pwsh
        run: >
          vpk upload github
          --repoUrl https://github.com/${{ github.repository }}
          --outputDir ${{ github.workspace }}/releases
          --publish
          --releaseName "v$env:VER"
          --tag "v$env:VER"
          --token ${{ secrets.GITHUB_TOKEN }}

